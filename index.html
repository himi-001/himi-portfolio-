<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO Ddamulira Fahiim | HIMI VISUALS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --himi-blue: #00AEEF;
            --dark-navy: #0a192f;
            --clean-white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .portfolio-card {
            background: var(--clean-white);
            width: 100%;
            max-width: 420px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
        }

        /* Top Brand Section */
        .brand-header {
            background: var(--dark-navy);
            padding: 40px 20px;
            position: relative;
        }

        .logo-box {
            width: 90px;
            height: 90px;
            background: var(--clean-white);
            margin: 0 auto 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid var(--himi-blue);
        }

        .logo-box img { width: 80%; object-fit: contain; }

        .company-title {
            color: var(--clean-white);
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* CEO Identity */
        .ceo-section {
            padding: 20px;
            margin-top: -30px;
            background: var(--clean-white);
            border-radius: 30px 30px 0 0;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--clean-white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            object-fit: cover;
            margin-bottom: 10px;
        }

        h1 { font-size: 1.5rem; margin: 5px 0; font-weight: 900; color: var(--dark-navy); }
        .ceo-tag { 
            color: var(--himi-blue); 
            font-weight: 700; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        /* Buttons & Links */
        .button-stack { padding: 0 25px 20px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            font-size: 0.95rem;
        }
        .btn-main { background: var(--himi-blue); color: white; border: none; }
        .btn-social { background: #f1f5f9; color: var(--dark-navy); border: 1px solid #e2e8f0; }

        /* Showcase Grid */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 20px;
            background: #fafafa;
        }
        .work-grid img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .work-grid img:hover { border-color: var(--himi-blue); }

        footer { padding: 20px; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <div class="brand-header">

                <!-- Replace with your actual logo file -->
                <img src="https://i.ibb.co/XZkjFGb5/RUHK6353.png" alt="HIMI VISUALS">
            </div>
            <div class="company-title">HIMI VISUALS</div>
        </div>

        <div class="ceo-section">
            <!-- Replace with your photo -->
            <img src="https://i.ibb.co/0RbHxkCP/KZLZ0208.png" class="profile-pic">
            <h1>DDAMULIRA FAHIIM</h1>
            <span class="ceo-tag">CHIEF EXECUTIVE OFFICER</span>
            <p style="font-size: 0.8rem; color: #64748b;">📍 Kampala, Uganda</p>
        </div>

        <div class="button-stack">
            <a href="https://wa.me/256704074696" class="btn btn-main">Chat on WhatsApp</a>
            <a href="https://www.tiktok.com/@d_fahim256" class="btn btn-social">TikTok Portfolio</a>
            <a href="https://www.instagram.com/dfahim_ajr" class="btn btn-social">Instagram</a>
            <a href="mailto:ddamulirafahiim25@gmail.com" class="btn btn-social">Business Email</a>
        </div>

        <div style="text-align: left; padding-left: 25px; font-weight: 700; font-size: 0.9rem;">FEATURED WORK</div>
        <div class="work-grid">
            <img src="https://i.ibb.co/LDJ8jj1m/VHWX8919.jpg" alt="Work">
            <img src="https://i.ibb.co/BxvL6QP/SEXD8860.jpg" alt="Work">
            <img src="https://i.ibb.co/mFqrnpgy/IMG-0106.jpg" alt="Work">
            <img src="https://i.ibb.co/7J5Wc4DP/BKCO1097.jpg" alt="Work">
        </div>

        <footer>
            &copy; 2026 HIMI VISUALS. Built for Digital!
        </footer>
    </div>

</body>
</html>
